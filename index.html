<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hydrogen Safety Categories - H2 Blending</title>
  <style>
    :root {
      --chs-blue: #005e82;
      --chs-green: #68bd49;
      --bg: #f4f8fb;
      --card: #ffffff;
      --text: #153040;
      --muted: #5f7380;
      --border: #d8e3ea;
      --tile-bg: #ffffff;
      --tile-hover: #eef6fa;
      --tile-selected: #d9edf7;
      --shadow: 0 8px 24px rgba(0, 56, 79, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f4f8fb 0%, #edf6f1 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    .game-card {
      background: var(--card);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 20px;
      border: 1px solid var(--border);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.9rem;
      line-height: 1.2;
      color: var(--chs-blue);
      text-align: center;
    }

    .subtitle {
      margin: 0 0 10px;
      text-align: center;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    .instructions {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 18px;
    }

    .status-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .mistakes {
      font-weight: 700;
      color: var(--chs-blue);
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: var(--chs-blue);
      color: #fff;
    }

    .btn-secondary {
      background: #e8f2f7;
      color: var(--chs-blue);
    }

    .btn-outline {
      background: #fff;
      color: var(--chs-blue);
      border: 1px solid var(--border);
    }

    .btn-reveal {
      background: var(--chs-green);
      color: #fff;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .tile {
      min-height: 84px;
      background: var(--tile-bg);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 10px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.2;
      cursor: pointer;
      user-select: none;
      transition: all 0.18s ease;
      word-break: break-word;
      overflow-wrap: anywhere;
      hyphens: auto;
    }

    .tile:hover {
      background: var(--tile-hover);
      border-color: #bdd7e5;
    }

    .tile.selected {
      background: var(--tile-selected);
      border-color: var(--chs-blue);
      transform: translateY(-1px);
    }

    .tile.shake {
      animation: shake 0.28s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }

    .solved-groups {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 18px;
    }

    .group {
      border-radius: 18px;
      padding: 14px 16px;
      color: #103240;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
    }

    .group h3 {
      margin: 0 0 6px;
      font-size: 1rem;
      text-align: center;
    }

    .group p {
      margin: 0;
      text-align: center;
      font-size: 0.95rem;
      line-height: 1.5;
      font-weight: 600;
    }

    .group-1 { background: #d9edf7; }
    .group-2 { background: #dff3d8; }
    .group-3 { background: #fff0c9; }
    .group-4 { background: #f6d7e7; }

    .message {
      margin-top: 16px;
      text-align: center;
      font-weight: 700;
      min-height: 24px;
      color: var(--chs-blue);
    }

    .footer-note {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.4;
    }

    @media (max-width: 700px) {
      .game-card {
        padding: 16px;
        border-radius: 20px;
      }

      h1 {
        font-size: 1.6rem;
      }

      .board {
        gap: 8px;
      }

      .tile {
        min-height: 74px;
        font-size: 0.88rem;
        padding: 8px 6px;
        border-radius: 14px;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 10px;
      }

      .game-card {
        padding: 14px;
      }

      .board {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 7px;
      }

      .tile {
        min-height: 68px;
        font-size: 0.8rem;
        padding: 6px 4px;
        line-height: 1.15;
      }

      button {
        width: 100%;
        max-width: 240px;
      }

      .controls {
        flex-direction: column;
        align-items: center;
      }
    }

    @media (max-width: 380px) {
      .tile {
        min-height: 64px;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="game-card">
      <h1>Hydrogen Safety Categories</h1>
      <p class="subtitle">April Challenge: Hydrogen to Natural Gas Blending</p>
      <p class="instructions">Select four terms that belong together.</p>

      <div class="status-bar">
        <div class="mistakes">Mistakes remaining: <span id="mistakes">4</span></div>
      </div>

      <div class="controls">
        <button class="btn-secondary" id="shuffleBtn">Shuffle</button>
        <button class="btn-outline" id="deselectBtn">Deselect All</button>
        <button class="btn-primary" id="submitBtn">Submit</button>
        <button class="btn-reveal" id="revealBtn">Reveal Answers</button>
      </div>

      <div id="solvedGroups" class="solved-groups"></div>
      <div id="board" class="board"></div>
      <div id="message" class="message"></div>

      <div class="footer-note">
        Inspired by hydrogen blending safety concepts including infrastructure, properties, risks, and injection approaches.
      </div>
    </div>
  </div>

  <script>
    const categories = [
      {
        name: "Blending Methods / Injection Approaches",
        className: "group-1",
        terms: ["Direct Injection", "Premixing", "Inline Blending", "Grid Injection"]
      },
      {
        name: "Infrastructure & System Components",
        className: "group-2",
        terms: ["Pipeline", "Compressor", "Metering Station", "Valve"]
      },
      {
        name: "Safety Risks & Considerations",
        className: "group-3",
        terms: ["Embrittlement", "Leakage", "Flame Speed", "Material Compatibility"]
      },
      {
        name: "Gas Properties & Performance Impacts",
        className: "group-4",
        terms: ["Wobbe Index", "Energy Density", "Heating Value", "Combustion Characteristics"]
      }
    ];

    const boardEl = document.getElementById("board");
    const solvedGroupsEl = document.getElementById("solvedGroups");
    const messageEl = document.getElementById("message");
    const mistakesEl = document.getElementById("mistakes");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const deselectBtn = document.getElementById("deselectBtn");
    const submitBtn = document.getElementById("submitBtn");
    const revealBtn = document.getElementById("revealBtn");

    let mistakesRemaining = 4;
    let selected = [];
    let solvedCategoryNames = [];
    let gameOver = false;

    const allTiles = categories.flatMap(category =>
      category.terms.map(term => ({
        term,
        category: category.name
      }))
    );

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    let currentTiles = shuffle(allTiles);

    function renderBoard() {
      boardEl.innerHTML = "";

      const unsolvedTiles = currentTiles.filter(
        tile => !solvedCategoryNames.includes(tile.category)
      );

      unsolvedTiles.forEach(tile => {
        const tileEl = document.createElement("button");
        tileEl.className = "tile";
        tileEl.textContent = tile.term;
        tileEl.type = "button";

        if (selected.includes(tile.term)) {
          tileEl.classList.add("selected");
        }

        if (!gameOver) {
          tileEl.addEventListener("click", () => toggleSelection(tile.term));
        } else {
          tileEl.style.cursor = "default";
        }

        boardEl.appendChild(tileEl);
      });
    }

    function renderSolvedGroups() {
      solvedGroupsEl.innerHTML = "";

      categories.forEach(category => {
        if (solvedCategoryNames.includes(category.name)) {
          const groupEl = document.createElement("div");
          groupEl.className = `group ${category.className}`;
          groupEl.innerHTML = `
            <h3>${category.name}</h3>
            <p>${category.terms.join(" • ")}</p>
          `;
          solvedGroupsEl.appendChild(groupEl);
        }
      });
    }

    function toggleSelection(term) {
      if (gameOver) return;

      if (selected.includes(term)) {
        selected = selected.filter(item => item !== term);
      } else {
        if (selected.length < 4) {
          selected.push(term);
          messageEl.textContent = "";
        } else {
          messageEl.textContent = "You can only select 4 terms at a time.";
        }
      }

      renderBoard();
    }

    function deselectAll() {
      if (gameOver) return;
      selected = [];
      messageEl.textContent = "";
      renderBoard();
    }

    function arraysMatch(a, b) {
      return [...a].sort().join("|") === [...b].sort().join("|");
    }

    function flashIncorrectSelection() {
      const tileButtons = [...document.querySelectorAll(".tile")];
      tileButtons.forEach(btn => {
        if (selected.includes(btn.textContent)) {
          btn.classList.add("shake");
          setTimeout(() => btn.classList.remove("shake"), 300);
        }
      });
    }

    function findOneAwayCategory() {
      for (const category of categories) {
        if (solvedCategoryNames.includes(category.name)) continue;

        const overlap = selected.filter(term => category.terms.includes(term)).length;
        if (overlap === 3) {
          return category;
        }
      }
      return null;
    }

    function endGame(finalMessage) {
      gameOver = true;
      submitBtn.disabled = true;
      shuffleBtn.disabled = true;
      deselectBtn.disabled = true;
      submitBtn.style.opacity = "0.6";
      shuffleBtn.style.opacity = "0.6";
      deselectBtn.style.opacity = "0.6";
      messageEl.textContent = finalMessage;
    }

    function submitSelection() {
      if (gameOver) return;

      if (selected.length !== 4) {
        messageEl.textContent = "Select exactly 4 terms.";
        return;
      }

      const matchedCategory = categories.find(category =>
        !solvedCategoryNames.includes(category.name) &&
        arraysMatch(selected, category.terms)
      );

      if (matchedCategory) {
        solvedCategoryNames.push(matchedCategory.name);
        selected = [];
        renderSolvedGroups();
        renderBoard();

        if (solvedCategoryNames.length === categories.length) {
          endGame("Excellent work! You solved all four categories.");
        } else {
          messageEl.textContent = `Correct: ${matchedCategory.name}`;
        }
      } else {
        const oneAway = findOneAwayCategory();
        mistakesRemaining--;
        mistakesEl.textContent = mistakesRemaining;
        flashIncorrectSelection();

        if (mistakesRemaining <= 0) {
          revealAnswers(false);
          return;
        }

        if (oneAway) {
          messageEl.textContent = "One away...";
        } else {
          messageEl.textContent = "Not quite. Try again.";
        }
      }
    }

    function revealAnswers(manualReveal = true) {
      solvedCategoryNames = categories.map(category => category.name);
      selected = [];
      renderSolvedGroups();
      renderBoard();

      if (manualReveal) {
        endGame("Answers revealed.");
      } else {
        endGame("Game over. The answers have been revealed.");
      }
    }

    function shuffleBoard() {
      if (gameOver) return;

      const unsolved = currentTiles.filter(tile => !solvedCategoryNames.includes(tile.category));
      const solved = currentTiles.filter(tile => solvedCategoryNames.includes(tile.category));
      currentTiles = [...solved, ...shuffle(unsolved)];
      renderBoard();
    }

    shuffleBtn.addEventListener("click", shuffleBoard);
    deselectBtn.addEventListener("click", deselectAll);
    submitBtn.addEventListener("click", submitSelection);
    revealBtn.addEventListener("click", () => revealAnswers(true));

    renderSolvedGroups();
    renderBoard();
  </script>
</body>
</html>
