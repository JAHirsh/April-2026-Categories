<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydrogen Safety Categories – April (Blending)</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f7f9;
  text-align: center;
  margin: 0;
  padding: 10px;
}

h1 {
  color: #005e82;
  font-size: 1.6rem;
}

#game {
  max-width: 500px;
  margin: auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 15px;
}

.tile {
  background: white;
  border: 2px solid #ccc;
  border-radius: 10px;
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 6px;
  font-weight: bold;
  font-size: 0.75rem;
  cursor: pointer;
  word-break: break-word;
}

.selected {
  background: #005e82;
  color: white;
}

.correct {
  color: white;
}

.cat1 { background: #f6e58d; }
.cat2 { background: #badc58; }
.cat3 { background: #7ed6df; }
.cat4 { background: #c7a7ff; }

button {
  margin: 5px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.primary { background: #005e82; color: white; }
.secondary { background: #ddd; }

#message {
  margin-top: 10px;
  font-weight: bold;
}

</style>
</head>

<body>

<h1>Hydrogen Safety Categories</h1>
<p>Group the terms into 4 correct categories</p>

<div id="game">
  <div id="grid" class="grid"></div>

  <div>
    <button class="secondary" onclick="shuffleTiles()">Shuffle</button>
    <button class="secondary" onclick="clearSelection()">Deselect</button>
    <button class="primary" onclick="submit()">Submit</button>
    <button class="secondary" onclick="reveal()">Reveal Answers</button>
  </div>

  <div id="message"></div>
</div>

<script>

const categories = [
{
  name: "Blending Methods / Injection Approaches",
  class: "cat1",
  words: ["Direct Injection","Premixing","Inline Blending","Grid Injection"]
},
{
  name: "Infrastructure & System Components",
  class: "cat2",
  words: ["Pipeline","Compressor","Metering Station","Valve"]
},
{
  name: "Safety Risks & Considerations",
  class: "cat3",
  words: ["Embrittlement","Leakage","Flame Speed","Material Compatibility"]
},
{
  name: "Gas Properties & Performance Impacts",
  class: "cat4",
  words: ["Wobbe Index","Energy Density","Heating Value","Combustion Characteristics"]
}
];

let tiles = [];
let selected = [];

function init() {
  tiles = [];
  categories.forEach(cat => {
    cat.words.forEach(word => {
      tiles.push({word: word, category: cat.name, class: cat.class});
    });
  });
  shuffleTiles();
}

function shuffleTiles() {
  tiles.sort(() => Math.random() - 0.5);
  render();
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  tiles.forEach(tile => {
    const div = document.createElement("div");
    div.className = "tile";
    div.innerText = tile.word;

    if (selected.includes(tile.word)) {
      div.classList.add("selected");
    }

    div.onclick = () => toggle(tile.word);

    grid.appendChild(div);
  });
}

function toggle(word) {
  if (selected.includes(word)) {
    selected = selected.filter(w => w !== word);
  } else {
    if (selected.length < 4) selected.push(word);
  }
  render();
}

function clearSelection() {
  selected = [];
  render();
}

function submit() {
  if (selected.length !== 4) {
    message("Select 4 items.");
    return;
  }

  const match = categories.find(cat =>
    cat.words.every(w => selected.includes(w))
  );

  if (match) {
    tiles = tiles.filter(t => !selected.includes(t.word));
    selected = [];
    message("Correct!");
  } else {
    selected = [];
    message("Try again.");
  }

  render();

  if (tiles.length === 0) {
    message("You solved all categories!");
  }
}

function reveal() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  categories.forEach(cat => {
    cat.words.forEach(word => {
      const div = document.createElement("div");
      div.className = "tile correct " + cat.class;
      div.innerText = word;
      grid.appendChild(div);
    });
  });
}

function message(msg) {
  document.getElementById("message").innerText = msg;
}

init();

</script>

</body>
</html>
